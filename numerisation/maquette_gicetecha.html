function imgCat(s){s=(""+s).toLowerCase();for(const[k,v]of GMAP){if(s.includes(k))return v;}return "farm";}
function hsh(s){let h=0;s=""+s;for(let i=0;i<s.length;i++)h=(h*31+s.charCodeAt(i))>>>0;return h;}
function imgUrl(seed,kw){const cat=PIC[kw]?kw:imgCat(seed);const arr=PIC[cat]||PIC.farm;return OV+arr[hsh(seed||cat)%arr.length]+"/thumb/";}
const Photo=({seed,h=120,radius=12,label,kw})=>(
  <div style={{height:h,borderRadius:radius,position:"relative",overflow:"hidden",background:"linear-gradient(135deg,var(--blue-100),#c7d2fe)"}}>
    <img src={imgUrl(seed,kw)} alt="" loading="lazy" style={{width:"100%",height:"100%",objectFit:"cover",display:"block"}}/>
    {label&&<div style={{position:"absolute",left:8,bottom:6,color:"#fff",fontSize:11,fontWeight:600,background:"rgba(15,23,42,.4)",padding:"2px 8px",borderRadius:999}}>{label}</div>}
  </div>);

const Stat=({icon:Ico,label,value,sub,tone="var(--blue)",down})=>(
  <div style={{background:"var(--surface)",border:"1px solid var(--line)",borderRadius:18,padding:18,minWidth:0,boxShadow:"var(--shadow-sm)"}}>
    <span style={{color:tone,background:"var(--blue-50)",borderRadius:12,padding:9,display:"inline-flex"}}><Ico size={18}/></span>
    <div style={{fontSize:23,fontWeight:800,marginTop:12,letterSpacing:-.5,fontFamily:"'Outfit',sans-serif",color:"var(--ink)"}}>{value}</div>
    <div style={{color:"var(--ink3)",fontSize:12.5,fontWeight:500,marginTop:2}}>{label}</div>
    {sub&&<div style={{color:down?"var(--danger)":"var(--green)",fontSize:11.5,marginTop:4,fontWeight:600,display:"inline-flex",alignItems:"center",gap:3}}>{down?<I.down size={13}/>:<I.trend size={13}/>}{sub}</div>}
  </div>);

const Section=({title,extra,children})=>(
  <div style={{marginTop:18}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
      <h3 style={{fontSize:16}}>{title}</h3>{extra}</div>
    {children}</div>);

const Progress=({value,color="var(--blue)"})=>(
  <div style={{height:8,borderRadius:999,background:"var(--neutral-bg)",overflow:"hidden"}}>
    <div style={{width:value+"%",height:"100%",background:color,borderRadius:999}}/></div>);

function Modules({mobile,active,onActivate,onDeactivate}){
  const Tg=({on,onClick,locked})=>(
    <button onClick={locked?undefined:onClick} title={locked?"Module MVP — toujours actif":(on?"Désactiver":"Activer")} style={{width:42,height:24,borderRadius:999,background:on?"var(--blue)":"var(--neutral-bg)",position:"relative",flexShrink:0,opacity:locked?.55:1,cursor:locked?"default":"pointer",border:"none"}}>
      <span style={{position:"absolute",top:3,left:on?21:3,width:18,height:18,borderRadius:"50%",background:"#fff",transition:".2s",boxShadow:"0 1px 2px rgba(0,0,0,.3)"}}/></button>);
  const phase2=["M3","M4","M5","M6"], phase3=["M7","M8","M9","M10","M11","M12","M13"], phase4=EXT_LIST.map(e=>e.code);
  const p2done=phase2.every(c=>active.includes(c));
  const p3done=phase3.every(c=>active.includes(c));
  const p4done=phase4.every(c=>active.includes(c));
  const next=!p2done?{ph:"Phase 2 — Diversification",desc:"Activez Porcs, Cultures, Stocks et Points de vente.",btn:"Activer la Diversification",codes:phase2,label:"Diversification activée 🌱",grad:"#14532D,#16A34A",tc:"#15803D"}
            :!p3done?{ph:"Phase 3 — Consolidation",desc:"Activez RH, CRM, Cacao, e-commerce, autres élevages, BI et Formation.",btn:"Activer la Consolidation",codes:phase3,label:"Consolidation activée 🚀",grad:"#1E3A8A,#2563EB",tc:"#1D4ED8"}
            :!p4done?{ph:"Phase 4 — Extensions",desc:"Activez les extensions : couvoir, fabrication d'aliment, abonnements, traçabilité, logistique, IA…",btn:"Activer les extensions",codes:phase4,label:"Extensions activées ✨",grad:"#5B21B6,#2563EB",tc:"#6D28D9"}:null;
  return (
    <div className="fade">
      <h1 style={{fontSize:26}}>Modules</h1>
      <p style={{color:"var(--ink3)",margin:"4px 0 16px",fontSize:14}}>25 modules — activez ou désactivez chacun via l'interrupteur. Les modules MVP (M1, M2) restent toujours actifs.</p>
      <div style={{display:"flex",gap:12,flexWrap:"wrap",marginBottom:6}}>
        <Stat icon={I.check} label="Modules actifs" value={active.length+" / 25"} tone="var(--green)"/>
        <Stat icon={I.layers} label="Phase en cours" value={p4done?"Phase 4":p3done?"Phase 3":p2done?"Phase 2":"Phase 1"} sub={p4done?"Extensions":p3done?"Consolidation":p2done?"Diversification":"MVP"}/>
        <Stat icon={I.calendar} label="Vision" value="20 ans"/>
      </div>
      {next&&(
        <div style={{display:"flex",alignItems:"center",gap:14,flexWrap:"wrap",background:"linear-gradient(120deg,"+next.grad+")",color:"#fff",borderRadius:18,padding:"16px 18px",marginTop:16,boxShadow:"var(--shadow-sm)"}}>
          <span style={{width:46,height:46,borderRadius:13,background:"rgba(255,255,255,.18)",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}><I.layers size={24}/></span>
          <div style={{flex:1,minWidth:180}}><strong style={{fontSize:15,color:"#fff"}}>{next.ph}</strong><div style={{fontSize:12.5,opacity:.92,marginTop:2}}>{next.desc}</div></div>
          <button onClick={()=>onActivate(next.codes,next.label)} className="press hov" style={{background:"#fff",color:next.tc,fontWeight:700,fontSize:13.5,borderRadius:999,padding:"11px 18px",display:"inline-flex",alignItems:"center",gap:7}}><I.check size={17}/>{next.btn}</button>
        </div>)}
      {MODULES.map((p,pi)=>(
        <Section key={pi} title={p.ph}>
          <div style={{display:"grid",gridTemplateColumns:mobile?"1fr":"1fr 1fr",gap:12}}>
            {p.items.map(m=>{const on=active.includes(m.n);
              return (
              <div key={m.n} style={{background:"var(--surface)",border:"1px solid "+(on?"var(--green)":"var(--line)"),borderRadius:16,padding:14,display:"flex",alignItems:"center",gap:12,opacity:on?1:.85,boxShadow:"var(--shadow-sm)"}}>
                <span style={{width:42,height:42,borderRadius:12,flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",background:on?"var(--green-50)":"var(--neutral-bg)",color:on?"var(--green)":"var(--ink3)"}}>{React.createElement(I[m.ic],{size:20})}</span>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{display:"flex",alignItems:"center",gap:6}}><span style={{fontSize:11,fontWeight:700,color:"var(--ink3)"}}>{m.n}</span><strong style={{fontSize:13.5,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{m.t}</strong></div>
                  <div style={{fontSize:11.5,color:"var(--ink3)",marginTop:2}}>Priorité : {m.prio}</div>
                </div>
                {(()=>{const core=m.n==="M1"||m.n==="M2"; const canAct=on||pi<=1||(pi===2&&p2done)||(pi===3&&p3done);
                  if(core) return <div style={{display:"flex",alignItems:"center",gap:7}}><span style={{fontSize:10.5,fontWeight:700,color:"var(--ok)"}}>MVP</span><Tg on locked/></div>;
                  if(canAct) return <Tg on={on} onClick={()=>on?onDeactivate(m.n):onActivate([m.n])}/>;
                  return <span style={{fontSize:11.5,color:"var(--ink3)",fontWeight:600,whiteSpace:"nowrap"}}>{pi===3?"Après Phase 3":"Après Phase 2"}</span>;})()}
              </div>);})}
          </div>
        </Section>))}
    </div>);
}

/* ============================ COURBE (LineChart) ============================ */
function LineChart({data,height=120,color="var(--blue)"}){
  const max=Math.max(...data.map(d=>d.v),1),n=data.length;
  const X=i=>(i/(n-1))*100, Y=v=>(1-v/max)*88+6;
  const line=data.map((d,i)=>`${X(i)},${Y(d.v)}`).join(" ");
  const area=`0,100 ${line} 100,100`;
  return (
    <div>
      <div style={{position:"relative",height}}>
        <svg viewBox="0 0 100 100" preserveAspectRatio="none" style={{position:"absolute",inset:0,width:"100%",height:"100%"}}>
          <defs><linearGradient id="lcg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stopColor={color} stopOpacity="0.22"/><stop offset="1" stopColor={color} stopOpacity="0"/></linearGradient></defs>
          <polygon points={area} fill="url(#lcg)"/>
          <polyline points={line} fill="none" stroke={color} strokeWidth="2" vectorEffect="non-scaling-stroke" strokeLinejoin="round" strokeLinecap="round"/>
        </svg>
        {data.map((d,i)=><div key={i} style={{position:"absolute",left:X(i)+"%",top:Y(d.v)+"%",transform:"translate(-50%,-50%)",width:9,height:9,borderRadius:"50%",background:"var(--surface)",border:"2px solid "+color}}/>)}
      </div>
      <div style={{display:"flex",justifyContent:"space-between",marginTop:6}}>
        {data.map((d,i)=><span key={i} style={{fontSize:10.5,color:"var(--ink3)",fontWeight:600}}>{d.l}</span>)}
      </div>
    </div>);
}

function getNav(role,act){
  if(role==="editeur") return [["grid","Tableau de bord","EditDash"],["users","Entreprises clientes","Entreprises"],["tag","Licences & formules","Licences"],["cog","Personnalisation","Branding"]];
  if(role==="comptable") return [["coins","Trésorerie","Tresorerie"],["idcard","Paie","Paie"],["chart","Rapports","Rapports"]];
  if(role==="livreur") return [["box","Livraisons","Logistique"],["receipt","Commandes","Commandes"]];
  if(role==="formateur") return [["book","Formation","Formation"]];
  if(role==="gerant"){
    const n=[["grid","Tableau de bord","Dashboard"],["leaf","Élevage","Elevage"]];
    if(act.includes("M3")) n.push(["pig","Porcs","Porcs"]);
    if(act.includes("M4")) n.push(["wheat","Cultures","Cultures"]);
    if(act.includes("M9")) n.push(["bean","Cacao","Cacao"]);
    if(act.includes("M11")) n.push(["fish","Autres élevages","Autres"]);
    n.push(["coins","Trésorerie","Tresorerie"]);
    if(act.includes("M8")) n.push(["contact","Clients & Fourn.","CRM"]);
    if(act.includes("M10")) n.push(["tag","E-commerce","Ecommerce"]);
    if(act.includes("M7")) n.push(["idcard","Personnel","RH"]);
    if(act.includes("M13")) n.push(["book","Formation","Formation"]);
    n.push(["chart","Rapports","Rapports"]);
    if(act.includes("M12")) n.push(["pie","Pilotage (BI)","BI"]);
    EXT_LIST.forEach(e=>{if(act.includes(e.code)) n.push([e.icon,e.label,e.key]);});
    n.push(["layers","Modules","Modules"],["users","Utilisateurs","Utilisateurs"]);
    return n;
  }
  if(role==="cogerant"){
    const n=[["clip","Saisie du jour","Saisie"],["leaf","Élevage","Elevage"]];
    if(act.includes("M3")) n.push(["pig","Porcs","Porcs"]);
    if(act.includes("M4")) n.push(["wheat","Cultures","Cultures"]);
    if(act.includes("M9")) n.push(["bean","Cacao","Cacao"]);
    if(act.includes("M11")) n.push(["fish","Autres","Autres"]);
    n.push(["cart","Ventes","Ventes"],["box","Stocks","Stocks"]);
    return n;
  }
  return NAV[role];
}

function renderScreen(role,screen,ctx){
  const {selected,setSelected,go,mobile,openModal,activeMods,activate,deactivate,chrome}=ctx;
  if(screen==="EditDash") return <EditeurDash mobile={mobile} go={go}/>;
  if(screen==="Entreprises") return <Entreprises mobile={mobile}/>;
  if(screen==="Licences") return <LicencesScreen mobile={mobile}/>;
  if(screen==="Branding") return <Branding mobile={mobile} chrome={chrome}/>;
  if(screen==="Tresorerie") return <Tresorerie mobile={mobile} openModal={openModal}/>;
  if(screen==="Rapports") return <Rapports mobile={mobile}/>;
  if(screen==="Commandes") return <Commandes mobile={mobile}/>;
  if(screen==="Notifications") return <Notifications mobile={mobile}/>;
  if(screen==="Parametres") return <Parametres mobile={mobile} role={role}/>;
  if(screen==="Porcs") return <Porcs mobile={mobile} openModal={openModal}/>;
  if(screen==="Cultures") return <Cultures mobile={mobile} openModal={openModal}/>;
  if(screen==="Cacao") return <Cacao mobile={mobile} openModal={openModal}/>;
  if(screen==="Autres") return <Autres mobile={mobile} openModal={openModal}/>;
  if(screen==="RH") return <RH mobile={mobile} openModal={openModal}/>;
  if(screen==="CRM") return <CRM mobile={mobile}/>;
  if(screen==="Ecommerce") return <Ecommerce mobile={mobile}/>;
  if(screen==="BI") return <BI mobile={mobile}/>;
  if(screen==="Formation") return <Formation mobile={mobile} openModal={openModal}/>;
  if(EXT[screen]){const C=P4[screen]; return C?<C mobile={mobile}/>:<ModuleScreen cfg={EXT[screen]} mobile={mobile}/>;}
  if(role==="gerant"){
    if(screen==="Dashboard") return <Dashboard mobile={mobile} go={go} act={activeMods}/>;
    if(screen==="Elevage") return <ElevageList mobile={mobile} openModal={openModal} onOpen={b=>{setSelected(b);go("__bande");}}/>;
    if(screen==="__bande") return <BandeDetail mobile={mobile} b={selected} openModal={openModal} onBack={()=>go("Elevage")}/>;
    if(screen==="Tresorerie") return <Tresorerie mobile={mobile} openModal={openModal}/>;
    if(screen==="Rapports") return <Rapports mobile={mobile}/>;
    if(screen==="Modules") return <Modules mobile={mobile} active={activeMods} onActivate={activate} onDeactivate={deactivate}/>;
    if(screen==="Utilisateurs") return <Utilisateurs mobile={mobile}/>;
  }
  if(role==="cogerant"){
    if(screen==="Saisie") return <Saisie mobile={mobile} openModal={openModal}/>;
    if(screen==="Elevage") return <ElevageList mobile={mobile} openModal={openModal} onOpen={b=>{setSelected(b);go("__bande");}}/>;
    if(screen==="__bande") return <BandeDetail mobile={mobile} b={selected} openModal={openModal} onBack={()=>go("Elevage")}/>;
    if(screen==="Ventes") return <Ventes mobile={mobile} openModal={openModal}/>;
    if(screen==="Stocks") return <Stocks mobile={mobile}/>;
  }
  if(role==="vendeur"){
    if(screen==="Caisse") return <Caisse mobile={mobile}/>;
    if(screen==="Ventes") return <Ventes mobile={mobile} openModal={openModal}/>;
    if(screen==="Produits") return <Boutique mobile={mobile} go={go}/>;
  }
  if(role==="client"){
    if(screen==="Boutique") return <Boutique mobile={mobile} go={go}/>;
    if(screen==="Panier") return <Panier mobile={mobile} openModal={openModal}/>;
    if(screen==="Commandes") return <Commandes mobile={mobile}/>;
  }
  return <div style={{padding:40,textAlign:"center",color:"var(--ink3)"}}>Écran « {screen} »</div>;
}

            <div style={{display:"flex",gap:22,marginTop:26}}>
              {[["25","modules"],["20 ans","de vision"],["100%","hors-ligne"]].map((s,i)=>(
                <div key={i}><div style={{fontSize:22,fontWeight:800,fontFamily:"'Outfit',sans-serif"}}>{s[0]}</div><div style={{fontSize:11.5,opacity:.85}}>{s[1]}</div></div>))}
            </div>
          </div>
          <div style={{display:"inline-flex",alignItems:"center",gap:7,fontSize:12.5,opacity:.9}}><I.wifi size={16}/>Synchronisation automatique à la reconnexion</div>
        </div>
        <div style={{padding:"34px 32px"}}>
          <h2 style={{fontSize:22}}>Connexion</h2>
          <p style={{color:"var(--ink3)",fontSize:13.5,margin:"4px 0 20px"}}>Accédez à votre espace GICETECHA.</p>
          <Field label="Email" icon={I.user} value="gildas@gicetecha.cm"/>
          <Field label="Mot de passe" icon={I.coins} value="motdepasse" pwd/>
          <div style={{fontSize:12.5,fontWeight:600,color:"var(--ink2)",margin:"6px 0 8px"}}>Se connecter en tant que</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:18}}>
            {ROLES.map(([k])=>{const r=roles[k]||{l:k,ic:I.user,d:""};const act=role===k;
              return <button key={k} onClick={()=>setRole(k)} className="hov" style={{display:"flex",alignItems:"center",gap:9,textAlign:"left",padding:"10px 12px",borderRadius:12,border:"1.5px solid "+(act?"var(--blue)":"var(--line)"),background:act?"var(--blue-50)":"var(--surface)"}}>
                <span style={{width:32,height:32,borderRadius:9,flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",background:act?"var(--blue)":"var(--neutral-bg)",color:act?"#fff":"var(--ink3)"}}>{React.createElement(r.ic,{size:17})}</span>
                <span style={{minWidth:0}}><span style={{display:"block",fontSize:13,fontWeight:700,color:"var(--ink)"}}>{r.l}</span><span style={{fontSize:11,color:"var(--ink3)"}}>{r.d}</span></span>
              </button>;})}
          </div>
          <Btn full onClick={()=>onLogin(role)}>Se connecter <I.arrow size={17}/></Btn>
          <div style={{textAlign:"center",marginTop:14}}><button className="hov" style={{color:"var(--blue)",fontSize:12.5,fontWeight:600}}>Mot de passe oublié ?</button></div>
        </div>
      </div>
    </div>);
}

/* ============================ APP SHELL ============================ */
function App(){
  const [auth,setAuth]=useState(false);
  const [mode,setMode]=useState("desktop");
  const [role,setRole]=useState("gerant");
  const [screen,setScreen]=useState("Dashboard");
  const [selected,setSelected]=useState(BANDES[0]);
  const [modal,setModal]=useState(null);
  const [toast,setToast]=useState("");
  const [activeMods,setActiveMods]=useState(["M1","M2"]);
  const [theme,setTheme]=useState("light");
  const [brand,setBrand]=useState("blue");
  const [cur,setCur]=useState("FCFA");
  const [appName,setAppName]=useState("GICETECHA");
  const showToast=m=>{setToast(m);setTimeout(()=>setToast(""),2400);};
  const activate=(codes,label)=>{setActiveMods(a=>[...new Set([...a,...[].concat(codes)])]);showToast(label||"Module activé ✓");};
  const deactivate=code=>{setActiveMods(a=>a.filter(c=>c!==code));showToast("Module désactivé");};
  const defScreen=r=>getNav(r,activeMods)[0][2];
  const switchRole=r=>{setRole(r);setScreen(defScreen(r));};
  const go=s=>setScreen(s);
  _CUR=CURRENCIES[cur]||CURRENCIES.FCFA;
  const br=BRANDS[brand]||BRANDS.blue;
  const themeVars={...THEMES[theme],"--blue":br[0],"--blue-700":br[1],"--blue-bright":br[2]};
  const chrome={theme,setTheme,brand,setBrand,cur,setCur,appName,setAppName};
  if(!auth) return <div style={themeVars}><Login onLogin={r=>{setRole(r);setScreen(defScreen(r));setAuth(true);}}/></div>;
  const mobile=mode==="mobile";
  const navItems=getNav(role,activeMods);
  const body=renderScreen(role,screen,{selected,setSelected,go,mobile,openModal:setModal,activeMods,activate,deactivate,chrome});
  const Layout=mobile?MobileLayout:DesktopLayout;
  return (
    <div style={{minHeight:"100vh",background:"var(--bg)",...themeVars}}>
      <div style={{background:"var(--slate)",color:"#fff",padding:"14px 20px",display:"flex",alignItems:"center",gap:12,flexWrap:"wrap",position:"sticky",top:0,zIndex:50}}>
        <div style={{display:"flex",alignItems:"center",gap:10,marginRight:"auto"}}>
          <span style={{width:34,height:34,borderRadius:10,background:"linear-gradient(135deg,#15803D,#16A34A)",display:"flex",alignItems:"center",justifyContent:"center"}}><I.leaf size={20}/></span>
          <div><div style={{fontWeight:800,fontSize:15,fontFamily:"'Outfit',sans-serif"}}>Maquette — {appName}</div>
          <div style={{fontSize:11,color:"#94a3b8"}}>SaaS agropastoral · multi-entreprises</div></div>
        </div>
        <div style={{display:"flex",gap:3,background:"#1e293b",padding:4,borderRadius:999,flexWrap:"wrap"}}>
          {ROLES.map(([k,l])=><button key={k} onClick={()=>switchRole(k)} style={{padding:"6px 11px",borderRadius:999,fontSize:11.5,fontWeight:600,background:role===k?"var(--blue)":"transparent",color:role===k?"#fff":"#cbd5e1"}}>{l}</button>)}
        </div>
        <div style={{display:"flex",gap:3,background:"#1e293b",padding:4,borderRadius:999}}>
          {[["light","☀"],["dark","🌙"]].map(([k,l])=><button key={k} onClick={()=>setTheme(k)} title={k==="dark"?"Mode sombre":"Mode clair"} style={{padding:"6px 11px",borderRadius:999,fontSize:12.5,fontWeight:600,background:theme===k?"#fff":"transparent",color:theme===k?"var(--slate)":"#cbd5e1"}}>{l}</button>)}
        </div>
        <div style={{display:"flex",gap:3,background:"#1e293b",padding:4,borderRadius:999}}>
          {["FCFA","EUR","USD"].map(c=><button key={c} onClick={()=>setCur(c)} style={{padding:"6px 10px",borderRadius:999,fontSize:11,fontWeight:600,background:cur===c?"var(--blue)":"transparent",color:cur===c?"#fff":"#cbd5e1"}}>{c}</button>)}
        </div>
        <div style={{display:"flex",gap:3,background:"#1e293b",padding:4,borderRadius:999}}>
          {[["desktop","🖥"],["mobile","📱"]].map(([k,l])=><button key={k} onClick={()=>setMode(k)} title={k} style={{padding:"6px 11px",borderRadius:999,fontSize:12.5,fontWeight:600,background:mode===k?"#fff":"transparent",color:mode===k?"var(--slate)":"#cbd5e1"}}>{l}</button>)}
        </div>
      </div>
      <div style={{maxWidth:1240,margin:"0 auto",padding:mobile?"24px 14px 50px":"26px 22px 60px"}}>
        <Layout role={role} screen={screen} go={go} body={body} nav={navItems} onLogout={()=>setAuth(false)}/>
        <p style={{textAlign:"center",color:"var(--ink3)",fontSize:12,marginTop:20}}>Prototype interactif — changez de rôle, basculez Desktop / Mobile, ouvrez une bande, testez les boutons « + » et le paiement.</p>
      </div>
      {modal&&(modal==="paiement"
        ? <PaymentModal mobile={mobile} close={()=>setModal(null)}/>
        : <FormModal id={modal} mobile={mobile} close={()=>setModal(null)} onSaved={m=>{setModal(null);showToast(m);}}/>)}
      {toast&&<div className="pop" style={{position:"fixed",left:"50%",bottom:28,transform:"translateX(-50%)",zIndex:200,background:"var(--slate)",color:"#fff",padding:"12px 20px",borderRadius:999,fontSize:13.5,fontWeight:600,display:"flex",alignItems:"center",gap:8,boxShadow:"var(--shadow)"}}><I.check size={17} style={{color:"#4ade80"}}/>{toast}</div>}
    </div>);
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
