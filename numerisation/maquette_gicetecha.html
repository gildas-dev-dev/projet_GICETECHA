<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>GICETECHA — Maquette (Web + Mobile)</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;600;700;800&display=swap" rel="stylesheet" />
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7/babel.min.js"></script>
<style>
  :root{
    --bg:#F8FAFC; --surface:#FFFFFF; --ink:#1E293B; --ink2:#475569; --ink3:#94A3B8;
    --blue:#2563EB; --blue-700:#1D4ED8; --blue-bright:#3B82F6; --blue-100:#DBEAFE; --blue-50:#EFF6FF;
    --green:#16A34A; --green-50:#E7F6EC; --line:#E2E8F0; --slate:#0F172A;
    --ok:#16A34A; --ok-bg:#DCFCE7; --warn:#B45309; --warn-bg:#FEF3C7;
    --info:#1D4ED8; --info-bg:#EFF6FF; --danger:#DC2626; --danger-bg:#FEE2E2;
    --neutral:#64748B; --neutral-bg:#F1F5F9; --amber:#D97706;
    --shadow:0 12px 32px rgba(15,23,42,.12); --shadow-sm:0 1px 2px rgba(15,23,42,.06);
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);font-family:Inter,sans-serif;color:var(--ink);-webkit-font-smoothing:antialiased}
  h1,h2,h3{font-family:'Outfit',sans-serif;letter-spacing:-.02em;margin:0}
  button{font-family:inherit;cursor:pointer;border:none;background:none}
  ::-webkit-scrollbar{width:8px;height:8px}::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:8px}
  .hov{transition:all .16s ease}
  .card-hov:hover{transform:translateY(-4px);box-shadow:var(--shadow)}
  .nav-it:hover{background:rgba(255,255,255,.07)}
  .btn-blue:hover{background:var(--blue-700);transform:translateY(-2px)}
  .lift:hover{box-shadow:var(--shadow-sm);border-color:var(--blue-bright)!important}
  .phone-shell{box-shadow:0 30px 60px rgba(15,23,42,.28)}
  .fade{animation:fade .3s ease}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  @media(max-width:780px){.login-hero{display:none!important}.login-grid{grid-template-columns:1fr!important;max-width:440px!important}}
  .pop{animation:pop .22s ease}@keyframes pop{from{opacity:0;transform:scale(.96)}to{opacity:1;transform:none}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
const {useState} = React;

/* ============================ ICONS ============================ */
const Ic=({d,size=20,sw=1.9,fill="none",style})=>(
  <svg width={size} height={size} viewBox="0 0 24 24" fill={fill} stroke="currentColor"
    strokeWidth={sw} strokeLinecap="round" strokeLinejoin="round" style={style}>{d}</svg>);
const I={
  grid:(p)=><Ic {...p} d={<><rect x="3" y="3" width="8" height="8" rx="1.5"/><rect x="13" y="3" width="8" height="8" rx="1.5"/><rect x="3" y="13" width="8" height="8" rx="1.5"/><rect x="13" y="13" width="8" height="8" rx="1.5"/></>}/>,
  leaf:(p)=><Ic {...p} d={<><path d="M11 20A7 7 0 0 1 4 13c0-5 4-9 16-9 0 8-4 13-9 13Z"/><path d="M4 20c2-5 5-7 9-8"/></>}/>,
  coins:(p)=><Ic {...p} d={<><ellipse cx="8" cy="7" rx="5" ry="2.6"/><path d="M3 7v5c0 1.4 2.2 2.6 5 2.6s5-1.2 5-2.6V7"/><path d="M13 12.5c.6 1 2.6 1.8 4.5 1.8 2.8 0 5-1.2 5-2.6V7c0-1.4-2.2-2.6-5-2.6-1.4 0-2.7.3-3.6.8"/></>}/>,
  chart:(p)=><Ic {...p} d={<><path d="M4 20V10M10 20V4M16 20v-7M22 20H2"/></>}/>,
  clip:(p)=><Ic {...p} d={<><rect x="5" y="4" width="14" height="17" rx="2"/><path d="M9 4a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2M9 11h6M9 15h4"/></>}/>,
  cart:(p)=><Ic {...p} d={<><circle cx="9" cy="20" r="1.5"/><circle cx="18" cy="20" r="1.5"/><path d="M2 3h3l2.4 12.4a1 1 0 0 0 1 .8h8.7a1 1 0 0 0 1-.8L21 7H6"/></>}/>,
  box:(p)=><Ic {...p} d={<><path d="M3 7.5 12 3l9 4.5v9L12 21 3 16.5z"/><path d="M3 7.5 12 12l9-4.5M12 12v9"/></>}/>,
  store:(p)=><Ic {...p} d={<><path d="M4 9V5h16v4M4 9l-1 0a1 1 0 0 1 .1-2L5 4h14l1.9 3a1 1 0 0 1 .1 2h-1M4 9c0 1.4 1 2 2 2s2-.6 2-2c0 1.4 1 2 2 2s2-.6 2-2c0 1.4 1 2 2 2s2-.6 2-2c0 1.4 1 2 2 2"/><path d="M5 11v9h14v-9M9 20v-5h6v5"/></>}/>,
  receipt:(p)=><Ic {...p} d={<><path d="M5 3v18l2-1.5L9 21l2-1.5L13 21l2-1.5L17 21l2-1.5V3l-2 1.5L15 3l-2 1.5L11 3 9 4.5 7 3z"/><path d="M8 8h8M8 12h6"/></>}/>,
  plus:(p)=><Ic {...p} d={<path d="M12 5v14M5 12h14"/>}/>,
  check:(p)=><Ic {...p} d={<path d="m5 12 4.5 4.5L19 7"/>}/>,
  x:(p)=><Ic {...p} d={<path d="M6 6 18 18M18 6 6 18"/>}/>,
  arrow:(p)=><Ic {...p} d={<path d="M5 12h14m-6-6 6 6-6 6"/>}/>,
  chev:(p)=><Ic {...p} d={<path d="m9 6 6 6-6 6"/>}/>,
  search:(p)=><Ic {...p} d={<><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></>}/>,
  bell:(p)=><Ic {...p} d={<><path d="M18 8a6 6 0 1 0-12 0c0 7-3 8-3 8h18s-3-1-3-8"/><path d="M10.5 20a2 2 0 0 0 3 0"/></>}/>,
  logout:(p)=><Ic {...p} d={<><path d="M14 20H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h8"/><path d="M17 15l3-3-3-3M9 12h11"/></>}/>,
  calendar:(p)=><Ic {...p} d={<><rect x="3" y="4.5" width="18" height="16" rx="2"/><path d="M3 9h18M8 2.5v4M16 2.5v4"/></>}/>,
  trend:(p)=><Ic {...p} d={<path d="M3 16l5-5 3.5 3.5L20 7m0 0h-5m5 0v5"/>}/>,
  down:(p)=><Ic {...p} d={<path d="M3 8l5 5 3.5-3.5L20 17m0 0h-5m5 0v-5"/>}/>,
  user:(p)=><Ic {...p} d={<><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 3.6-6 8-6s8 2 8 6"/></>}/>,
  users:(p)=><Ic {...p} d={<><circle cx="9" cy="8" r="3.2"/><path d="M3 20c0-3.3 2.7-5 6-5s6 1.7 6 5"/><path d="M16 5.2A3.2 3.2 0 0 1 16 11M21 20c0-2.6-1.5-4.2-4-4.8"/></>}/>,
  wallet:(p)=><Ic {...p} d={<><rect x="3" y="6" width="18" height="13" rx="2"/><path d="M3 10h18M16 14h2"/></>}/>,
  egg:(p)=><Ic {...p} d={<path d="M12 3c3.5 0 6 5 6 9a6 6 0 0 1-12 0c0-4 2.5-9 6-9Z"/>}/>,
  syringe:(p)=><Ic {...p} d={<><path d="M18 2l4 4M17 5l2 2M14.5 7.5l2 2M3 21l8.5-8.5M9 9l6 6M6 12l6 6"/></>}/>,
  wheat:(p)=><Ic {...p} d={<><path d="M12 22V8"/><path d="M12 8c0-2-1.5-3.5-3.5-3.5C8.5 6.5 10 8 12 8Zm0 0c0-2 1.5-3.5 3.5-3.5C15.5 6.5 14 8 12 8Zm0 5c0-2-1.5-3.5-3.5-3.5C8.5 11.5 10 13 12 13Zm0 0c0-2 1.5-3.5 3.5-3.5C15.5 11.5 14 13 12 13Z"/></>}/>,
  pig:(p)=><Ic {...p} d={<><path d="M4 12a6 6 0 0 1 6-6h2l3-2v3a6 6 0 0 1 5 5l1 .5-1 1.5v3h-3l-1 2h-3l-1-2H8l-1 2H4v-3a6 6 0 0 1 0-6Z"/><circle cx="9" cy="11" r=".6" fill="currentColor"/></>}/>,
  alert:(p)=><Ic {...p} d={<><path d="M10.3 4 2.7 17.5A1.5 1.5 0 0 0 4 20h16a1.5 1.5 0 0 0 1.3-2.5L13.7 4a1.5 1.5 0 0 0-2.6 0Z"/><path d="M12 9v4M12 16.5v.5"/></>}/>,
  drop:(p)=><Ic {...p} d={<path d="M12 3s6 6.5 6 10a6 6 0 0 1-12 0c0-3.5 6-10 6-10Z"/>}/>,
  pin:(p)=><Ic {...p} d={<><path d="M12 21s7-5.4 7-11a7 7 0 1 0-14 0c0 5.6 7 11 7 11Z"/><circle cx="12" cy="10" r="2.5"/></>}/>,
  wifi:(p)=><Ic {...p} d={<><path d="M5 12.5a10 10 0 0 1 14 0M8 16a5 5 0 0 1 8 0"/><circle cx="12" cy="19.5" r="1" fill="currentColor"/></>}/>,
  cog:(p)=><Ic {...p} d={<><circle cx="12" cy="12" r="3"/><path d="M19 12a7 7 0 0 0-.1-1l2-1.5-2-3.4-2.3 1a7 7 0 0 0-1.7-1l-.3-2.6H10.4l-.3 2.6a7 7 0 0 0-1.7 1l-2.3-1-2 3.4L6 11a7 7 0 0 0 0 2l-2 1.5 2 3.4 2.3-1a7 7 0 0 0 1.7 1l.3 2.6h3.2l.3-2.6a7 7 0 0 0 1.7-1l2.3 1 2-3.4-2-1.5a7 7 0 0 0 .1-1z"/></>}/>,
  layers:(p)=><Ic {...p} d={<><path d="M12 2 2 7l10 5 10-5z"/><path d="m2 12 10 5 10-5M2 17l10 5 10-5"/></>}/>,
  shield:(p)=><Ic {...p} d={<><path d="M12 3 5 6v5c0 4.4 3 7.6 7 9 4-1.4 7-4.6 7-9V6z"/><path d="m9.2 12 2 2 3.6-4"/></>}/>,
  mail:(p)=><Ic {...p} d={<><rect x="3" y="5" width="18" height="14" rx="2.5"/><path d="m3.5 7 8.5 6 8.5-6"/></>}/>,
  globe:(p)=><Ic {...p} d={<><circle cx="12" cy="12" r="9"/><path d="M3 12h18M12 3a14 14 0 0 1 0 18M12 3a14 14 0 0 0 0 18"/></>}/>,
  info:(p)=><Ic {...p} d={<><circle cx="12" cy="12" r="9"/><path d="M12 11v5M12 8v.5"/></>}/>,
};

/* ============================ DATA ============================ */
const fcfa=n=>n.toLocaleString('fr-FR')+" FCFA";
const fk=n=> (n>=1000000?(n/1000000).toLocaleString('fr-FR',{maximumFractionDigits:2})+" M":n.toLocaleString('fr-FR'));

const BANDES=[
  {id:"B-024", nom:"Poulets de chair", init:210, effectif:200, jour:28, duree:42, mortalite:4.8, statut:"encours", cout:420000, vente:0, seed:"poulet-a"},
  {id:"B-025", nom:"Pondeuses (test)", init:50, effectif:50, jour:6, duree:120, mortalite:0, statut:"demarrage", cout:95000, vente:0, seed:"poule-c"},
  {id:"B-023", nom:"Poulets de chair", init:60, effectif:0, jour:42, duree:42, mortalite:6.7, statut:"terminee", cout:165000, vente:340000, seed:"poulet-b"},
];
const BSTAT={encours:{l:"En cours",c:"var(--info)",bg:"var(--info-bg)"},demarrage:{l:"Démarrage",c:"var(--warn)",bg:"var(--warn-bg)"},terminee:{l:"Terminée",c:"var(--neutral)",bg:"var(--neutral-bg)"}};

const MOUVEMENTS=[
  {date:"22 juin", lib:"Vente bande B-023 (52 sujets)", type:"in", montant:340000, cat:"Ventes"},
  {date:"20 juin", lib:"Achat aliment démarrage", type:"out", montant:85000, cat:"Aliments"},
  {date:"18 juin", lib:"Achat poussins B-025", type:"out", montant:75000, cat:"Cheptel"},
  {date:"15 juin", lib:"Vaccination B-024", type:"out", montant:22000, cat:"Santé"},
  {date:"12 juin", lib:"Vente œufs (8 plateaux)", type:"in", montant:18000, cat:"Ventes"},
  {date:"08 juin", lib:"Aliment croissance B-024", type:"out", montant:96000, cat:"Aliments"},
];

const PRODUITS=[
  {id:1,nom:"Poulet de chair (vif)",unit:"par kg",prix:3500,seed:"chair",stock:200,cat:"Volaille"},
  {id:2,nom:"Poulet rôti",unit:"pièce",prix:4500,seed:"roti",stock:12,cat:"Transformation"},
  {id:3,nom:"Œufs — plateau de 30",unit:"plateau",prix:2800,seed:"oeufs",stock:24,cat:"Volaille"},
  {id:4,nom:"Manioc",unit:"régime",prix:1500,seed:"manioc",stock:40,cat:"Cultures"},
  {id:5,nom:"Plantain",unit:"régime",prix:2000,seed:"plantain",stock:30,cat:"Cultures"},
  {id:6,nom:"Miel pur",unit:"pot 500g",prix:3000,seed:"miel",stock:8,cat:"Apiculture"},
];

const STOCKS=[
  {nom:"Aliment démarrage",qte:6,unit:"sacs 50kg",seuil:5,bas:false},
  {nom:"Aliment croissance",qte:3,unit:"sacs 50kg",seuil:5,bas:true},
  {nom:"Vaccin Newcastle",qte:2,unit:"flacons",seuil:3,bas:true},
  {nom:"Copeaux (litière)",qte:9,unit:"sacs",seuil:4,bas:false},
];

/* ============================ UI ============================ */
const Btn=({children,onClick,full,small,ghost,danger})=>(
  <button onClick={onClick} className={ghost?"lift hov":"btn-blue hov"} style={{
    width:full?"100%":"auto",padding:small?"9px 16px":"12px 20px",borderRadius:999,fontWeight:600,fontSize:small?13:14,
    display:"inline-flex",alignItems:"center",justifyContent:"center",gap:8,
    background:ghost?"var(--blue-50)":danger?"var(--danger)":"var(--blue)",color:ghost?"var(--blue-700)":"#fff",
    border:ghost?"1px solid transparent":"none",boxShadow:ghost?"none":"0 8px 18px rgba(37,99,235,.25)"}}>{children}</button>);

const Badge=({m})=> <span style={{background:m.bg,color:m.c,fontSize:11.5,fontWeight:600,padding:"4px 10px",borderRadius:999,whiteSpace:"nowrap"}}>{m.l}</span>;

const Avatar=({name,size=44,green})=>{const ini=name.split(" ").map(w=>w[0]).slice(0,2).join("");
  return <div style={{width:size,height:size,borderRadius:"50%",flexShrink:0,background:green?"var(--green-50)":"var(--blue-100)",color:green?"var(--green)":"var(--blue-700)",fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center",fontSize:size*.36}}>{ini}</div>;};

const Photo=({seed,h=120,radius=12,label})=>(
  <div style={{height:h,borderRadius:radius,position:"relative",overflow:"hidden",background:"linear-gradient(135deg,var(--blue-100),#c7d2fe)"}}>
    <img src={`https://picsum.photos/seed/gic-${encodeURIComponent(seed)}/500/360`} alt="" style={{width:"100%",height:"100%",objectFit:"cover",display:"block"}}/>
    {label&&<div style={{position:"absolute",left:8,bottom:6,color:"#fff",fontSize:11,fontWeight:600,background:"rgba(15,23,42,.4)",padding:"2px 8px",borderRadius:999}}>{label}</div>}
  </div>);

const Stat=({icon:Ico,label,value,sub,tone="var(--blue)",down})=>(
  <div style={{background:"var(--surface)",border:"1px solid var(--line)",borderRadius:18,padding:18,minWidth:0,boxShadow:"var(--shadow-sm)"}}>
    <span style={{color:tone,background:"var(--blue-50)",borderRadius:12,padding:9,display:"inline-flex"}}><Ico size={18}/></span>
    <div style={{fontSize:23,fontWeight:800,marginTop:12,letterSpacing:-.5,fontFamily:"'Outfit',sans-serif",color:"var(--ink)"}}>{value}</div>
    <div style={{color:"var(--ink3)",fontSize:12.5,fontWeight:500,marginTop:2}}>{label}</div>
    {sub&&<div style={{color:down?"var(--danger)":"var(--green)",fontSize:11.5,marginTop:4,fontWeight:600,display:"inline-flex",alignItems:"center",gap:3}}>{down?<I.down size={13}/>:<I.trend size={13}/>}{sub}</div>}
  </div>);

const Section=({title,extra,children})=>(
  <div style={{marginTop:18}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
      <h3 style={{fontSize:16}}>{title}</h3>{extra}</div>
    {children}</div>);

const Progress=({value,color="var(--blue)"})=>(
  <div style={{height:8,borderRadius:999,background:"var(--neutral-bg)",overflow:"hidden"}}>
    <div style={{width:value+"%",height:"100%",background:color,borderRadius:999}}/></div>);

/* ============================ SCREENS — GÉRANT ============================ */
function Dashboard({mobile,go}){
  const acts=[["leaf","Volaille","Actif","var(--green)",true],["pig","Porcs","Phase 2",null,false],["wheat","Cultures","Phase 2",null,false],["store","Transformation","Phase 2",null,false]];
  return (
    <div className="fade">
      <h1 style={{fontSize:26}}>Bonjour, Gildas 👋</h1>
      <p style={{color:"var(--ink3)",margin:"4px 0 18px",fontSize:14}}>Vue d'ensemble de l'exploitation · mardi 23 juin 2026.</p>
      <div style={{display:"grid",gridTemplateColumns:mobile?"1fr 1fr":"repeat(4,1fr)",gap:12,marginBottom:16}}>
        <Stat icon={I.coins} label="Trésorerie nette" value={fk(1250000)} sub="+101 000 ce mois"/>
        <Stat icon={I.leaf} label="Bandes actives" value="2" sub="250 sujets"/>
        <Stat icon={I.trend} label="Marge prévis. B-024" value="+38%" sub="cycle en cours"/>
        <Stat icon={I.drop} label="Mortalité moyenne" value="4,8%" sub="objectif < 6%"/>
      </div>

      <Section title="Activités de l'exploitation">
        <div style={{display:"grid",gridTemplateColumns:mobile?"1fr 1fr":"repeat(4,1fr)",gap:12}}>
          {acts.map(([ic,nom,etat,col,active])=>(
            <div key={nom} className={active?"card-hov hov":""} onClick={()=>active&&go("Elevage")} style={{background:"var(--surface)",border:"1px solid var(--line)",borderRadius:16,padding:16,opacity:active?1:.6,cursor:active?"pointer":"default",boxShadow:"var(--shadow-sm)"}}>
              <span style={{color:active?"var(--green)":"var(--ink3)",background:active?"var(--green-50)":"var(--neutral-bg)",borderRadius:12,padding:9,display:"inline-flex"}}>{React.createElement(I[ic],{size:20})}</span>
              <div style={{fontWeight:700,marginTop:10,fontSize:14.5}}>{nom}</div>
              <div style={{fontSize:12,fontWeight:600,marginTop:3,color:active?"var(--green)":"var(--ink3)"}}>{etat}</div>
            </div>))}
        </div>
      </Section>

      <div style={{display:"grid",gridTemplateColumns:mobile?"1fr":"1.4fr 1fr",gap:16,marginTop:18}}>
        <div style={{background:"var(--surface)",border:"1px solid var(--line)",borderRadius:18,padding:18,boxShadow:"var(--shadow-sm)"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
            <strong>Mouvements récents</strong>
            <button onClick={()=>go("Tresorerie")} style={{color:"var(--blue)",fontWeight:600,fontSize:13,display:"inline-flex",gap:4,alignItems:"center"}}>Trésorerie <I.arrow size={15}/></button></div>
          {MOUVEMENTS.slice(0,4).map((m,i)=>(
            <div key={i} style={{display:"flex",alignItems:"center",gap:12,padding:"11px 0",borderBottom:i<3?"1px solid var(--line)":"none"}}>
              <span style={{width:34,height:34,borderRadius:10,display:"flex",alignItems:"center",justifyContent:"center",background:m.type==="in"?"var(--ok-bg)":"var(--danger-bg)",color:m.type==="in"?"var(--ok)":"var(--danger)"}}>{m.type==="in"?<I.trend size={16}/>:<I.down size={16}/>}</span>
              <div style={{flex:1,minWidth:0}}><div style={{fontSize:13.5,fontWeight:600,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{m.lib}</div><div style={{fontSize:11.5,color:"var(--ink3)"}}>{m.date} · {m.cat}</div></div>
              <strong style={{fontSize:13.5,color:m.type==="in"?"var(--ok)":"var(--danger)",whiteSpace:"nowrap"}}>{m.type==="in"?"+":"−"}{fcfa(m.montant)}</strong>
            </div>))}
        </div>
        <div style={{background:"var(--surface)",border:"1px solid var(--line)",borderRadius:18,padding:18,boxShadow:"var(--shadow-sm)"}}>
          <strong>Profits & pertes — juin</strong>
          <div style={{marginTop:14}}>
            <div style={{display:"flex",justifyContent:"space-between",fontSize:13.5,marginBottom:6}}><span style={{color:"var(--ink2)"}}>Revenus</span><b style={{color:"var(--ok)"}}>{fcfa(358000)}</b></div>
            <Progress value={100} color="var(--ok)"/>
            <div style={{display:"flex",justifyContent:"space-between",fontSize:13.5,margin:"14px 0 6px"}}><span style={{color:"var(--ink2)"}}>Dépenses</span><b style={{color:"var(--danger)"}}>{fcfa(257000)}</b></div>
            <Progress value={72} color="var(--danger)"/>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:16,paddingTop:14,borderTop:"1px solid var(--line)"}}>
              <span style={{fontWeight:700}}>Résultat net</span><span style={{fontWeight:800,fontSize:18,color:"var(--ok)",fontFamily:"'Outfit',sans-serif"}}>+{fcfa(101000)}</span></div>
          </div>
        </div>
      </div>
    </div>);
}

function ElevageList({mobile,onOpen,saisie}){
  return (
    <div className="fade">
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:10}}>
        <div><h1 style={{fontSize:26}}>Élevage — Volaille</h1><p style={{color:"var(--ink3)",margin:"4px 0 0",fontSize:14}}>Suivi des bandes (cycles d'élevage).</p></div>

function renderScreen(role,screen,ctx){
  const {selected,setSelected,go,mobile}=ctx;
  if(screen==="Notifications") return <Notifications mobile={mobile}/>;
  if(screen==="Parametres") return <Parametres mobile={mobile} role={role}/>;
  if(role==="gerant"){
    if(screen==="Dashboard") return <Dashboard mobile={mobile} go={go}/>;
    if(screen==="Elevage") return <ElevageList mobile={mobile} onOpen={b=>{setSelected(b);go("__bande");}}/>;
    if(screen==="__bande") return <BandeDetail mobile={mobile} b={selected} onBack={()=>go("Elevage")}/>;
    if(screen==="Tresorerie") return <Tresorerie mobile={mobile}/>;
    if(screen==="Rapports") return <Rapports mobile={mobile}/>;
    if(screen==="Modules") return <Modules mobile={mobile}/>;
    if(screen==="Utilisateurs") return <Utilisateurs mobile={mobile}/>;
  }
  if(role==="cogerant"){
    if(screen==="Saisie") return <Saisie mobile={mobile}/>;
    if(screen==="Elevage") return <ElevageList mobile={mobile} onOpen={b=>{setSelected(b);go("__bande");}}/>;
    if(screen==="__bande") return <BandeDetail mobile={mobile} b={selected} onBack={()=>go("Elevage")}/>;
    if(screen==="Ventes") return <Ventes mobile={mobile}/>;
    if(screen==="Stocks") return <Stocks mobile={mobile}/>;
  }
  if(role==="vendeur"){
    if(screen==="Caisse") return <Caisse mobile={mobile}/>;
    if(screen==="Ventes") return <Ventes mobile={mobile}/>;
    if(screen==="Produits") return <Boutique mobile={mobile} go={go}/>;
  }
  if(role==="client"){
    if(screen==="Boutique") return <Boutique mobile={mobile} go={go}/>;
    if(screen==="Panier") return <Panier mobile={mobile}/>;
    if(screen==="Commandes") return <Commandes mobile={mobile}/>;
  }
  return <div style={{padding:40,textAlign:"center",color:"var(--ink3)"}}>Écran « {screen} »</div>;
}

      <div className="phone-shell" style={{width:390,maxWidth:"100%",background:"var(--bg)",borderRadius:38,border:"9px solid #0f172a",overflow:"hidden",display:"flex",flexDirection:"column",height:780}}>
        <div style={{background:"#0f172a",height:24,display:"flex",justifyContent:"center"}}><div style={{width:120,height:18,background:"#0f172a",borderRadius:"0 0 14px 14px"}}/></div>
        <header style={{background:"var(--surface)",borderBottom:"1px solid var(--line)",padding:"12px 16px",display:"flex",alignItems:"center",gap:10}}>
          <span style={{width:30,height:30,borderRadius:9,background:"linear-gradient(135deg,#15803D,#16A34A)",display:"flex",alignItems:"center",justifyContent:"center",color:"#fff"}}><I.leaf size={18}/></span>
          <span style={{fontWeight:800,fontSize:15,fontFamily:"'Outfit',sans-serif"}}>GICE<span style={{color:"var(--green)"}}>TECHA</span></span>
          <button onClick={()=>go("Notifications")} style={{marginLeft:"auto",position:"relative",color:"var(--ink2)"}}><I.bell size={20}/><span style={{position:"absolute",top:-1,right:-1,width:7,height:7,borderRadius:"50%",background:"var(--blue)"}}/></button>
          <button onClick={()=>go("Parametres")} className="hov" style={{color:"var(--ink2)"}}><I.cog size={19}/></button>
          <button onClick={onLogout} title="Se déconnecter" className="hov" style={{color:"var(--ink3)"}}><I.logout size={19}/></button>
        </header>
        <main style={{flex:1,overflow:"auto",padding:16}}>{body}</main>
        <nav style={{background:"var(--surface)",borderTop:"1px solid var(--line)",display:"flex",justifyContent:"space-around",padding:"8px 2px 14px"}}>
          {items.map(([ic,label,key])=>{const act=screen===key||(screen.startsWith("__")&&key==="Elevage");
            return <button key={key} onClick={()=>go(key)} style={{flex:1,minWidth:0,display:"flex",flexDirection:"column",alignItems:"center",gap:3,padding:"4px 0",color:act?"var(--blue)":"var(--ink3)"}}>
              {React.createElement(I[ic],{size:20})}<span style={{fontSize:9,fontWeight:act?700:500,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",maxWidth:"100%"}}>{SHORT[key]||label.split(" ")[0]}</span></button>;})}
        </nav>
      </div>
    </div>);
}

/* ============================ LOGIN ============================ */
function Login({onLogin}){
  const [role,setRole]=useState("gerant");
  const Field=({label,icon:Ico,value,pwd})=>(
    <div style={{marginBottom:13}}>
      <label style={{fontSize:12.5,fontWeight:600,color:"var(--ink2)"}}>{label}</label>
      <div style={{marginTop:6,display:"flex",alignItems:"center",gap:9,background:"var(--bg)",border:"1px solid var(--line)",borderRadius:12,padding:"12px 13px"}}>
        <Ico size={17} style={{color:"var(--ink3)"}}/>
        <input defaultValue={value} type={pwd?"password":"text"} style={{flex:1,minWidth:0,border:"none",outline:"none",background:"transparent",fontSize:14,color:"var(--ink)",fontFamily:"Inter"}}/>
      </div>
    </div>);
  const roles={gerant:{l:"Gérant",ic:I.grid,d:"Pilotage global"},cogerant:{l:"Co-gérant",ic:I.clip,d:"Saisie & ventes"},vendeur:{l:"Vendeur",ic:I.store,d:"Caisse"},client:{l:"Client",ic:I.cart,d:"Boutique"}};
  return (
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"radial-gradient(circle at 30% 15%, #1e293b, #0f172a 72%)",padding:"30px 16px"}}>
      <div className="login-grid" style={{width:"100%",maxWidth:940,display:"grid",gridTemplateColumns:"1fr 1fr",borderRadius:24,overflow:"hidden",boxShadow:"var(--shadow)",background:"var(--surface)"}}>
        <div className="login-hero" style={{background:"linear-gradient(150deg,#14532D,#16A34A 55%,#2563EB)",color:"#fff",padding:"38px 34px",display:"flex",flexDirection:"column"}}>
          <Brand light/>
          <div style={{flex:1,display:"flex",flexDirection:"column",justifyContent:"center",padding:"30px 0"}}>
            <h1 style={{fontSize:29,lineHeight:1.18,color:"#fff"}}>Pilotez toute votre exploitation, du poulailler à la vente.</h1>
            <p style={{opacity:.92,marginTop:14,fontSize:14.5,lineHeight:1.6}}>Élevage, trésorerie, stocks et boutique — un seul outil, même hors-ligne.</p>
            <div style={{display:"flex",gap:22,marginTop:26}}>
              {[["13","modules"],["20 ans","de vision"],["100%","hors-ligne"]].map((s,i)=>(
                <div key={i}><div style={{fontSize:22,fontWeight:800,fontFamily:"'Outfit',sans-serif"}}>{s[0]}</div><div style={{fontSize:11.5,opacity:.85}}>{s[1]}</div></div>))}
            </div>
          </div>
          <div style={{display:"inline-flex",alignItems:"center",gap:7,fontSize:12.5,opacity:.9}}><I.wifi size={16}/>Synchronisation automatique à la reconnexion</div>
        </div>
        <div style={{padding:"34px 32px"}}>
          <h2 style={{fontSize:22}}>Connexion</h2>
          <p style={{color:"var(--ink3)",fontSize:13.5,margin:"4px 0 20px"}}>Accédez à votre espace GICETECHA.</p>
          <Field label="Email" icon={I.user} value="gildas@gicetecha.cm"/>
          <Field label="Mot de passe" icon={I.coins} value="motdepasse" pwd/>
          <div style={{fontSize:12.5,fontWeight:600,color:"var(--ink2)",margin:"6px 0 8px"}}>Se connecter en tant que</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:18}}>
            {ROLES.map(([k])=>{const r=roles[k];const act=role===k;
              return <button key={k} onClick={()=>setRole(k)} className="hov" style={{display:"flex",alignItems:"center",gap:9,textAlign:"left",padding:"10px 12px",borderRadius:12,border:"1.5px solid "+(act?"var(--blue)":"var(--line)"),background:act?"var(--blue-50)":"var(--surface)"}}>
                <span style={{width:32,height:32,borderRadius:9,flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",background:act?"var(--blue)":"var(--neutral-bg)",color:act?"#fff":"var(--ink3)"}}>{React.createElement(r.ic,{size:17})}</span>
                <span style={{minWidth:0}}><span style={{display:"block",fontSize:13,fontWeight:700,color:"var(--ink)"}}>{r.l}</span><span style={{fontSize:11,color:"var(--ink3)"}}>{r.d}</span></span>
              </button>;})}
          </div>
          <Btn full onClick={()=>onLogin(role)}>Se connecter <I.arrow size={17}/></Btn>
          <div style={{textAlign:"center",marginTop:14}}><button className="hov" style={{color:"var(--blue)",fontSize:12.5,fontWeight:600}}>Mot de passe oublié ?</button></div>
        </div>
      </div>
    </div>);
}

/* ============================ APP SHELL ============================ */
function App(){
  const [auth,setAuth]=useState(false);
  const [mode,setMode]=useState("desktop");
  const [role,setRole]=useState("gerant");
  const [screen,setScreen]=useState("Dashboard");
  const [selected,setSelected]=useState(BANDES[0]);
  const defScreen=r=>NAV[r][0][2];
  const switchRole=r=>{setRole(r);setScreen(defScreen(r));};
  const go=s=>setScreen(s);
  if(!auth) return <Login onLogin={r=>{setRole(r);setScreen(defScreen(r));setAuth(true);}}/>;
  const mobile=mode==="mobile";
  const body=renderScreen(role,screen,{selected,setSelected,go,mobile});
  const Layout=mobile?MobileLayout:DesktopLayout;
  return (
    <div style={{minHeight:"100vh"}}>
      <div style={{background:"var(--slate)",color:"#fff",padding:"14px 20px",display:"flex",alignItems:"center",gap:16,flexWrap:"wrap",position:"sticky",top:0,zIndex:50}}>
        <div style={{display:"flex",alignItems:"center",gap:10,marginRight:"auto"}}>
          <span style={{width:34,height:34,borderRadius:10,background:"linear-gradient(135deg,#15803D,#16A34A)",display:"flex",alignItems:"center",justifyContent:"center"}}><I.leaf size={20}/></span>
          <div><div style={{fontWeight:800,fontSize:15,fontFamily:"'Outfit',sans-serif"}}>Maquette — GICETECHA</div>
          <div style={{fontSize:11,color:"#94a3b8"}}>Agropastoral & Agro-industriel · MVP · Cameroun</div></div>
        </div>
        <div style={{display:"flex",gap:4,background:"#1e293b",padding:4,borderRadius:999}}>
          {ROLES.map(([k,l])=><button key={k} onClick={()=>switchRole(k)} style={{padding:"7px 13px",borderRadius:999,fontSize:12,fontWeight:600,background:role===k?"var(--blue)":"transparent",color:role===k?"#fff":"#cbd5e1"}}>{l}</button>)}
        </div>
        <div style={{display:"flex",gap:4,background:"#1e293b",padding:4,borderRadius:999}}>
          {[["desktop","🖥  Desktop"],["mobile","📱  Mobile"]].map(([k,l])=><button key={k} onClick={()=>setMode(k)} style={{padding:"7px 13px",borderRadius:999,fontSize:12,fontWeight:600,background:mode===k?"#fff":"transparent",color:mode===k?"var(--slate)":"#cbd5e1"}}>{l}</button>)}
        </div>
      </div>
      <div style={{maxWidth:1240,margin:"0 auto",padding:mobile?"24px 14px 50px":"26px 22px 60px"}}>
        <Layout role={role} screen={screen} go={go} body={body} onLogout={()=>setAuth(false)}/>
        <p style={{textAlign:"center",color:"var(--ink3)",fontSize:12,marginTop:20}}>Prototype interactif — changez de rôle, basculez Desktop / Mobile, ouvrez une bande ou la caisse.</p>
      </div>
    </div>);
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
